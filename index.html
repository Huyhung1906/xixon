<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Hưng Chào Xí Xọn 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink-deep:  #c0145e;
      --pink-mid:   #e83878;
      --pink-light: #ff6fa8;
      --pink-pale:  #ffb3d1;
      --photo-size: clamp(100px, 22vmin, 160px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Quicksand', sans-serif;
      background: #0d0008;
    }

    /* ── Background ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%,  #3a0025 0%, transparent 70%),
        radial-gradient(ellipse 60% 80% at 80% 100%, #25001a 0%, transparent 60%),
        radial-gradient(ellipse 50% 70% at 10% 80%,  #1e0016 0%, transparent 60%),
        linear-gradient(160deg, #110009 0%, #1a000d 40%, #0d0008 100%);
    }

    /* ── Bokeh blobs ── */
    .bokeh { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
    .bokeh span {
      position: absolute; border-radius: 50%;
      filter: blur(50px); opacity: 0;
      animation: drift linear infinite;
    }
    .bokeh span:nth-child(1){width:min(40vw,320px);height:min(40vw,320px);background:#c0145e33;left:10%;top:20%;animation-duration:14s;}
    .bokeh span:nth-child(2){width:min(25vw,200px);height:min(25vw,200px);background:#ff6fa822;left:70%;top:10%;animation-duration:18s;animation-delay:2s;}
    .bokeh span:nth-child(3){width:min(32vw,260px);height:min(32vw,260px);background:#e8387822;left:50%;top:60%;animation-duration:16s;animation-delay:4s;}
    .bokeh span:nth-child(4){width:min(22vw,180px);height:min(22vw,180px);background:#c0145e25;left:25%;top:70%;animation-duration:20s;animation-delay:1s;}
    .bokeh span:nth-child(5){width:min(35vw,280px);height:min(35vw,280px);background:#ff6fa81a;left:80%;top:50%;animation-duration:15s;animation-delay:3s;}
    @keyframes drift {
      0%   { transform:translateY(0) scale(1);     opacity:0; }
      10%  { opacity:1; }
      50%  { transform:translateY(-60px) scale(1.1); opacity:.8; }
      90%  { opacity:1; }
      100% { transform:translateY(0) scale(1);     opacity:0; }
    }

    /* ── Stars ── */
    .stars { position:fixed; inset:0; z-index:2; pointer-events:none; }
    .star {
      position:absolute; border-radius:50%; background:#ffb3d1;
      animation:twinkle ease-in-out infinite;
    }
    @keyframes twinkle {
      0%,100%{ opacity:0; transform:scale(.5); }
      50%    { opacity:1; transform:scale(1.4); }
    }

    /* ── Canvas ── */
    canvas#pinkboard {
      position:fixed; inset:0; z-index:3;
      width:100%; height:100%; display:block;
    }

    /* ── Floating hearts ── */
    .floaty { position:fixed; inset:0; z-index:4; pointer-events:none; overflow:hidden; }
    .mini-heart {
      position:absolute; bottom:-50px;
      animation:floatUp linear; opacity:0;
      will-change:transform;
    }
    @keyframes floatUp {
      0%  { transform:translateY(0) rotate(0deg) scale(.8); opacity:0; }
      8%  { opacity:.75; }
      85% { opacity:.4; }
      100%{ transform:translateY(-115vh) rotate(25deg) scale(1.2); opacity:0; }
    }

    /* ── Scene ── */
    .scene {
      position:fixed; inset:0; z-index:10;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:clamp(8px, 2vmin, 20px);
      padding:16px;
      pointer-events:none;
    }

    /* ── Heading ── */
    .heading {
      font-family:'Dancing Script', cursive;
      font-size:clamp(1.1rem, 5vw, 2.8rem);
      color:var(--pink-pale);
      text-align:center;
      text-shadow:0 0 20px #e83878cc, 0 0 50px #c0145e88, 0 2px 4px #00000066;
      letter-spacing:clamp(1px, .5vw, 3px);
      line-height:1.3;
      padding:0 8px;
      animation:fadeSlideDown 1.2s ease both, pulse-glow 3s ease-in-out infinite 1.2s;
    }
    @keyframes fadeSlideDown {
      from{ opacity:0; transform:translateY(-28px); }
      to  { opacity:1; transform:translateY(0); }
    }
    @keyframes pulse-glow {
      0%,100%{ text-shadow:0 0 20px #e83878cc,0 0 50px #c0145e88; }
      50%    { text-shadow:0 0 35px #ff6fa8ff,0 0 80px #e8387899,0 0 120px #c0145e55; }
    }

    /* ── Frame wrapper ── */
    .frame-wrap {
      position:relative;
      width:var(--photo-size);
      height:var(--photo-size);
      flex-shrink:0;
      animation:fadeScaleIn 1.4s cubic-bezier(.34,1.56,.64,1) .3s both,
                heartbeat 2.4s ease-in-out infinite 2s;
    }
    @keyframes fadeScaleIn {
      from{ opacity:0; transform:scale(.5) rotate(-8deg); }
      to  { opacity:1; transform:scale(1)  rotate(0deg); }
    }
    @keyframes heartbeat {
      0%,100%{ transform:scale(1); }
      14%    { transform:scale(1.07); }
      28%    { transform:scale(1); }
      42%    { transform:scale(1.04); }
      70%    { transform:scale(1); }
    }

    /* Glow rings */
    .glow-ring {
      position:absolute; border-radius:50%; border:2px solid;
      top:50%; left:50%; transform:translate(-50%,-50%);
      animation:ring-expand ease-out infinite;
      pointer-events:none;
    }
    .glow-ring:nth-child(1){ border-color:#e8387855; animation-duration:2.4s; animation-delay:0s; }
    .glow-ring:nth-child(2){ border-color:#ff6fa833; animation-duration:2.4s; animation-delay:.8s; }
    .glow-ring:nth-child(3){ border-color:#c0145e22; animation-duration:2.4s; animation-delay:1.6s; }
    @keyframes ring-expand {
      0%  { width:calc(var(--photo-size)*1.0); height:calc(var(--photo-size)*1.0); opacity:.9; }
      100%{ width:calc(var(--photo-size)*1.95); height:calc(var(--photo-size)*1.95); opacity:0; }
    }

    /* Photo circle */
    .photo-circle {
      position:absolute; inset:0; z-index:2;
      border-radius:50%; overflow:hidden;
      border:4px solid transparent;
      background:
        linear-gradient(#1a000d,#1a000d) padding-box,
        linear-gradient(135deg,#e83878,#ffb3d1,#c0145e,#ff6fa8,#e83878) border-box;
      box-shadow:
        0 0 0 5px #c0145e1a,
        0 0 clamp(15px,4vw,30px) #e8387866,
        0 0 clamp(30px,8vw,60px) #c0145e44,
        inset 0 0 18px #00000033;
    }
    .photo-circle img {
      width:100%; height:100%;
      object-fit:cover; display:block;
      filter:brightness(1.05) saturate(1.1);
    }
    .photo-circle::after {
      content:''; position:absolute; inset:0; border-radius:50%;
      background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 50%,rgba(255,180,210,.1) 100%);
      pointer-events:none;
    }

    /* Deco spinning dots */
    .deco-ring {
      position:absolute; top:50%; left:50%;
      width:1px; height:1px;
      transform:translate(-50%,-50%);
      animation:spinRing 12s linear infinite;
      pointer-events:none;
    }
    .deco-dot {
      position:absolute;
      width:clamp(5px,1.4vmin,8px);
      height:clamp(5px,1.4vmin,8px);
      border-radius:50%;
      background:radial-gradient(circle,#ffb3d1,#e83878);
      box-shadow:0 0 6px #e83878;
      transform:translate(-50%,-50%);
    }
    @keyframes spinRing{ to{ transform:translate(-50%,-50%) rotate(360deg); } }

    /* Caption */
    .caption {
      font-family:'Dancing Script', cursive;
      font-size:clamp(.85rem, 3.5vw, 1.4rem);
      color:var(--pink-light);
      text-align:center;
      text-shadow:0 0 15px #e8387877;
      letter-spacing:1px;
      padding:0 12px;
      opacity:0;
      animation:fadeSlideUp 1s ease 1.8s both;
    }
    @keyframes fadeSlideUp {
      from{ opacity:0; transform:translateY(16px); }
      to  { opacity:1; transform:translateY(0); }
    }

    /* Dot row */
    .dots-row {
      display:flex; gap:clamp(5px,1.5vw,9px);
      opacity:0;
      animation:fadeSlideUp 1s ease 2.2s both;
    }
    .dot-pulse {
      width:clamp(6px,1.5vmin,9px);
      height:clamp(6px,1.5vmin,9px);
      border-radius:50%;
      background:var(--pink-mid);
      box-shadow:0 0 7px var(--pink-mid);
      animation:dotPulse 1.4s ease-in-out infinite;
    }
    .dot-pulse:nth-child(2){animation-delay:.2s;}
    .dot-pulse:nth-child(3){animation-delay:.4s;}
    .dot-pulse:nth-child(4){animation-delay:.6s;}
    .dot-pulse:nth-child(5){animation-delay:.8s;}
    @keyframes dotPulse {
      0%,100%{ transform:scale(1);   opacity:.5; }
      50%    { transform:scale(1.7); opacity:1; }
    }

    /* Landscape / very small screen */
    @media (max-height:480px) {
      .heading{ font-size:clamp(.9rem,3.5vh,1.3rem); }
      .scene{ gap:6px; }
      .caption{ font-size:clamp(.75rem,2.5vh,1rem); }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="bokeh"><span></span><span></span><span></span><span></span><span></span></div>
  <div class="stars" id="stars"></div>
  <canvas id="pinkboard"></canvas>
  <div class="floaty" id="floaty"></div>

  <div class="scene">
    <h1 class="heading">💕 Tặng Xí Xọn Một Trái Tim 💕</h1>

    <div class="frame-wrap" id="frameWrap">
      <div class="glow-ring"></div>
      <div class="glow-ring"></div>
      <div class="glow-ring"></div>
      <div class="deco-ring" id="decoRing"></div>
      <div class="photo-circle">
        <img src="huyhung.png" alt="Ảnh kỷ niệm"
          onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22160%22 height=%22160%22%3E%3Crect width=%22160%22 height=%22160%22 fill=%22%23200010%22/%3E%3Ctext x=%2280%22 y=%2295%22 font-size=%2260%22 text-anchor=%22middle%22%3E%F0%9F%92%96%3C/text%3E%3C/svg%3E'">
      </div>
    </div>

    <p class="caption">Chúc Xí Xọn thật rực rỡ nhoaa ✨</p>
    <div class="dots-row">
      <div class="dot-pulse"></div><div class="dot-pulse"></div><div class="dot-pulse"></div>
      <div class="dot-pulse"></div><div class="dot-pulse"></div>
    </div>
  </div>

<script>
/* ─────────────── helpers ─────────────── */
function photoSize(){
  var vmin=Math.min(window.innerWidth,window.innerHeight);
  return Math.min(160,Math.max(100,vmin*0.22));
}

/* ─────────────── Stars ─────────────── */
(function(){
  var c=document.getElementById('stars');
  var n=Math.min(80,Math.floor(window.innerWidth*window.innerHeight/8000));
  for(var i=0;i<n;i++){
    var s=document.createElement('div');s.className='star';
    var sz=Math.random()*3+1;
    s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+sz+'px;height:'+sz+'px;animation-duration:'+(Math.random()*3+1.5)+'s;animation-delay:'+(Math.random()*4)+'s';
    c.appendChild(s);
  }
})();

/* ─────────────── Deco spinning dots ─────────────── */
(function(){
  var ring=document.getElementById('decoRing');
  var DOT_COUNT=10;
  function buildDots(){
    ring.innerHTML='';
    var ps=photoSize();
    var r=ps*0.72+8;
    for(var i=0;i<DOT_COUNT;i++){
      var dot=document.createElement('div');dot.className='deco-dot';
      var angle=(360/DOT_COUNT)*i;
      var rad=angle*Math.PI/180;
      dot.style.left=(Math.cos(rad)*r)+'px';
      dot.style.top=(Math.sin(rad)*r)+'px';
      ring.appendChild(dot);
    }
  }
  buildDots();
  window.addEventListener('resize',buildDots);
  window.addEventListener('orientationchange',function(){setTimeout(buildDots,200);});
})();

/* ─────────────── Floating mini hearts ─────────────── */
(function(){
  var c=document.getElementById('floaty');
  var hearts=['💕','💗','💓','💖','💘','🌸','✨','💝'];
  function spawn(){
    var el=document.createElement('div');el.className='mini-heart';
    el.textContent=hearts[Math.floor(Math.random()*hearts.length)];
    el.style.left=Math.random()*100+'%';
    el.style.fontSize=(Math.random()*14+10)+'px';
    var dur=Math.random()*8+6;
    el.style.animationDuration=dur+'s';
    c.appendChild(el);
    setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},dur*1000+300);
  }
  setInterval(spawn,700);
  for(var i=0;i<6;i++)setTimeout(spawn,i*400);
})();

/* ─────────────── Heart particle system ─────────────── */
(function(){
  /* rAF polyfill */
  var _b=0,_pfx=["ms","moz","webkit","o"];
  for(var _a=0;_a<_pfx.length&&!window.requestAnimationFrame;++_a){window.requestAnimationFrame=window[_pfx[_a]+"RequestAnimationFrame"];window.cancelAnimationFrame=window[_pfx[_a]+"CancelAnimationFrame"]||window[_pfx[_a]+"CancelRequestAnimationFrame"];}
  if(!window.requestAnimationFrame){window.requestAnimationFrame=function(h){var d=Date.now(),f=Math.max(0,16-(d-_b)),g=setTimeout(function(){h(d+f);},f);_b=d+f;return g;};}
  if(!window.cancelAnimationFrame){window.cancelAnimationFrame=function(d){clearTimeout(d);};}

  function calcCount(){
    var a=window.innerWidth*window.innerHeight;
    return a<250000?200:a<600000?320:450;
  }

  var cfg={length:calcCount(),duration:2.2,velocity:90,effect:-0.75,size:22};

  function Pt(x,y){this.x=x||0;this.y=y||0;}
  Pt.prototype.clone=function(){return new Pt(this.x,this.y);};
  Pt.prototype.len=function(l){if(l===undefined)return Math.sqrt(this.x*this.x+this.y*this.y);var n=this.len();this.x=this.x/n*l;this.y=this.y/n*l;return this;};

  function Pr(){this.pos=new Pt();this.vel=new Pt();this.acc=new Pt();this.age=0;}
  Pr.prototype.init=function(x,y,dx,dy){this.pos.x=x;this.pos.y=y;this.vel.x=dx;this.vel.y=dy;this.acc.x=dx*cfg.effect;this.acc.y=dy*cfg.effect;this.age=0;};
  Pr.prototype.update=function(dt){this.pos.x+=this.vel.x*dt;this.pos.y+=this.vel.y*dt;this.vel.x+=this.acc.x*dt;this.vel.y+=this.acc.y*dt;this.age+=dt;};
  Pr.prototype.draw=function(ctx,img){
    var t=this.age/cfg.duration,sz=img.width*((--t)*t*t+1);
    ctx.globalAlpha=1-this.age/cfg.duration;
    ctx.drawImage(img,this.pos.x-sz/2,this.pos.y-sz/2,sz,sz);
  };

  var pool,fA=0,fF=0;
  function initPool(){pool=[];for(var i=0;i<cfg.length;i++)pool.push(new Pr());fA=0;fF=0;}
  initPool();

  function padd(x,y,dx,dy){pool[fF].init(x,y,dx,dy);fF++;if(fF==cfg.length)fF=0;if(fA==fF)fA++;if(fA==cfg.length)fA=0;}
  function pupd(dt){
    var i;
    if(fA<fF)for(i=fA;i<fF;i++)pool[i].update(dt);
    if(fF<fA){for(i=fA;i<cfg.length;i++)pool[i].update(dt);for(i=0;i<fF;i++)pool[i].update(dt);}
    while(pool[fA].age>=cfg.duration&&fA!=fF){fA++;if(fA==cfg.length)fA=0;}
  }
  function pdrw(ctx,img){
    var i;
    if(fA<fF)for(i=fA;i<fF;i++)pool[i].draw(ctx,img);
    if(fF<fA){for(i=fA;i<cfg.length;i++)pool[i].draw(ctx,img);for(i=0;i<fF;i++)pool[i].draw(ctx,img);}
  }

  function heartPt(t){
    return new Pt(
      160*Math.pow(Math.sin(t),3),
      130*Math.cos(t)-50*Math.cos(2*t)-20*Math.cos(3*t)-10*Math.cos(4*t)+25
    );
  }

  var hImg=(function(){
    var c=document.createElement('canvas'),ctx=c.getContext('2d');
    c.width=cfg.size;c.height=cfg.size;
    function to(t){var p=heartPt(t);p.x=cfg.size/2+p.x*cfg.size/350;p.y=cfg.size/2-p.y*cfg.size/350;return p;}
    ctx.beginPath();
    var t=-Math.PI,p=to(t);ctx.moveTo(p.x,p.y);
    while(t<Math.PI){t+=0.01;p=to(t);ctx.lineTo(p.x,p.y);}
    ctx.closePath();
    var g=ctx.createRadialGradient(cfg.size/2,cfg.size/2,0,cfg.size/2,cfg.size/2,cfg.size/2);
    g.addColorStop(0,'#ff9ec8');g.addColorStop(.5,'#e83878');g.addColorStop(1,'#c0145e');
    ctx.fillStyle=g;ctx.fill();
    var img=new Image();img.src=c.toDataURL();return img;
  })();

  var canvas=document.getElementById('pinkboard');
  var ctx=canvas.getContext('2d');
  var time;

  function onResize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    var nc=calcCount();
    if(nc!==cfg.length){cfg.length=nc;initPool();}
  }

  function render(){
    requestAnimationFrame(render);
    var now=Date.now()/1000,dt=Math.min(now-(time||now),.05);time=now;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    var rate=cfg.length/cfg.duration,n=rate*dt;
    for(var i=0;i<n;i++){
      var pos=heartPt(Math.PI-2*Math.PI*Math.random());
      var dir=pos.clone();
      var dl=dir.len();
      dir.x=dir.x/dl*cfg.velocity;
      dir.y=dir.y/dl*cfg.velocity;
      padd(canvas.width/2+pos.x,canvas.height/2-pos.y,dir.x,-dir.y);
    }
    pupd(dt);pdrw(ctx,hImg);
  }

  window.addEventListener('resize',onResize);
  window.addEventListener('orientationchange',function(){setTimeout(onResize,250);});
  setTimeout(function(){onResize();render();},10);
})();
</script>
</body>
</html>
